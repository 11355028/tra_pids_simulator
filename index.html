<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵車站 PIDS 與廣播模擬系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1, h2 { color: #00d2ff; }
        h1 { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        /* 系統控制面板 */
        .control-panel {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .train-settings {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #00d2ff;
        }
        .station-settings { border-left: 4px solid #ffaa00; }
        .voice-settings { border-left: 4px solid #a855f7; } /* 語音設定專屬紫 */
        
        .form-group { display: inline-block; margin-right: 12px; margin-bottom: 10px; }
        .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
        input, select { 
            background: #111; color: #fff; border: 1px solid #555; 
            padding: 8px; border-radius: 4px; font-family: inherit;
        }
        input[type="time"] { font-family: monospace; }
        button { 
            background: #0066cc; color: white; border: none; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #0088ff; }
        button.action-btn { background: #d9534f; }
        button.action-btn:hover { background: #c9302c; }
        
        /* 車站 PIDS 告示牌 */
        .station-pids {
            background-color: #000;
            border: 6px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .pids-header {
            display: flex; justify-content: space-between;
            color: #00ff00; font-size: 18px; font-weight: bold;
            border-bottom: 2px dashed #444; padding-bottom: 10px; margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .pids-table { width: 100%; border-collapse: collapse; text-align: center; margin-bottom: 15px;}
        .pids-table th { color: #888; font-size: 14px; padding-bottom: 10px; font-weight: normal; }
        .pids-table td { font-size: 26px; font-weight: bold; padding: 12px 5px; letter-spacing: 2px; }
        
        /* 跑馬燈專屬區塊 */
        .pids-marquee-container {
            border-top: 2px solid #333;
            padding-top: 10px;
            overflow: hidden;
            white-space: nowrap;
        }
        .pids-marquee {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: #ffaa00;
            animation: marquee 20s linear infinite;
            padding-left: 100%;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* 台鐵 LED 經典配色 */
        .t-local { color: #00ff00; }        
        .t-tzu-chiang { color: #ff0000; }   
        .t-chu-kuang { color: #ffaa00; }    
        .t-fu-hsing { color: #00bfff; }     
        
        .c-time { color: #ffaa00; }
        .c-destination { color: #ffaa00; }
        .c-platform { color: #ff0000; }
        .c-status-on-time { color: #00ff00; }
        .c-status-delay { color: #ff0000; animation: blink 1s infinite alternate; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }
        
        /* 系統日誌 */
        .log-box {
            background: #000; border: 1px solid #444; padding: 10px;
            height: 120px; overflow-y: auto; font-family: monospace;
            color: #4CAF50; font-size: 13px; border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚉 台鐵車站 PIDS 與廣播模擬系統</h1>
    
    <div class="control-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">

            <div class="form-group">

                    <option value="深澳線|Shen'ao Line">深澳線</option>

            </div>
            <div class="form-group"><label>時間</label><input type="time" id="t1_time" value="14:15"></div>
            <div class="form-group"><label>目的地(中)</label><input type="text" id="t1_dest" value="台東" style="width:70px;"></div>
            <div class="form-group"><label>目的地(英)</label><input type="text" id="t1_dest_en" value="Taitung" style="width:80px;"></div>
            <div class="form-group"><label>月台</label><input type="text" id="t1_plat" value="3A" style="width:40px;"></div>

        </div>
        
        <div class="train-settings">
            <strong style="color: #fff;">【第二月台 / 班次 2】</strong><br><br>
            <div class="form-group"><label>車次</label><input type="text" id="t2_num" value="4028" style="width:60px;"></div>
            <div class="form-group">
                <label>車種</label>
                <select id="t2_type">
                    <option value="t-tzu-chiang|Tze-Chiang Limited Express">自強</option>
                    <option value="t-tzu-chiang|New Tze-Chiang Limited Express">新自強</option>
                    <option value="t-tzu-chiang|Puyuma Express">普悠瑪</option>
                    <option value="t-tzu-chiang|Taroko Express">太魯閣</option>
                    <option value="t-chu-kuang|Chu-Kuang Express">莒光</option>
                    <option value="t-fu-hsing|Fu-Hsing Semi Express">復興</option>
                    <option value="t-local|Fast Local Train" selected>區間快</option>
                    <option value="t-local|Local Train">區間</option>
                </select>
            </div>
            <div class="form-group">
                <label>經由 (留空則跳過)</label>
                <select id="t2_via">
                    <option value="|">留空</option>
                    <option value="山線|Mountain Line">山線</option>
                    <option value="海線|Coast Line" selected>海線</option>
                    <option value="北迴線|North-Link Line">北迴線</option>
                    <option value="東線|East Line">東線</option>
                    <option value="宜蘭線|Yilan Line">宜蘭線</option>
                    <option value="成追線|Chengzhui Line">成追線</option>
                    <option value="平溪線|Pingxi Line">平溪線</option>
                    <option value="深澳線|Shen'ao Line">深澳線</option>
                    <option value="南迴線|South-Link Line">南迴線</option>
                    <option value="集集線|Jiji Line">集集線</option>
                    <option value="六家線|Liujia Line">六家線</option>
                    <option value="內灣線|Neiwan Line">內灣線</option>
                </select>
            </div>
            <div class="form-group"><label>時間</label><input type="time" id="t2_time" value="14:28"></div>
            <div class="form-group"><label>目的地(中)</label><input type="text" id="t2_dest" value="花蓮" style="width:70px;"></div>
            <div class="form-group"><label>目的地(英)</label><input type="text" id="t2_dest_en" value="Hualien" style="width:80px;"></div>
            <div class="form-group"><label>月台</label><input type="text" id="t2_plat" value="1" style="width:40px;"></div>
            <div class="form-group"><label>晚點</label><input type="number" id="t2_delay" value="12" style="width:50px;"></div>
        </div>
        <button onclick="updateData()" style="width: 100%;">套用設定並強制更新顯示器</button>
    </div>

    <div class="station-pids">
        <div class="pids-header">
            <div id="pids-station-name">本站：台北 STATION: TAIPEI</div>
            <div id="pids-clock">目前時間 14:00</div>
        </div>
        <table class="pids-table">
            <thead>
                <tr>
                    <th>車次<br>Train</th>
                    <th>車種<br>Type</th>
                    <th>經由<br>Via</th>
                    <th>目的地<br>Dest.</th>
                    <th>時間<br>Time</th>
                    <th>月台<br>Plat.</th>
                    <th>狀態<br>Status</th>
                </tr>
            </thead>
            <tbody id="pids-body">
                </tbody>

        <div class="pids-marquee-container">

                </div>

    <h2>系統狀態與廣播日誌</h2>
    <div class="log-box" id="logBox">系統已啟動。準備好執行廣播。</div>

</div>

<script>
    let lastNormalBroadcast = { t1: "", t2: "" };
    let lastDelayBroadcast = { t1: -1, t2: -1 };
    let voices = [];
    let pidsLang = 'zh';

    // 載入系統所有內建語音人員並動態塞入下拉選單
    function loadVoices() {
        if ('speechSynthesis' in window) {
            voices = window.speechSynthesis.getVoices();
            
            const zhSelect = document.getElementById('voice_zh_select');
            const enSelect = document.getElementById('voice_en_select');
            
            // 記住當前玩家可能已經選好的選單值
            const currentZhSelection = zhSelect.value;
            const currentEnSelection = enSelect.value;
            
            zhSelect.innerHTML = '';
            enSelect.innerHTML = '';
            
            voices.forEach((v, index) => {
                const langLower = v.lang.toLowerCase();
                // 篩選中文語音 (zh-TW, zh-CN, zh-HK)
                if (langLower.startsWith('zh')) {
                    let opt = new Option(`${v.name} (${v.lang})`, index);
                    zhSelect.add(opt);
                }
                // 篩選英文語音 (en-US, en-GB 等)
                if (langLower.startsWith('en')) {
                    let opt = new Option(`${v.name} (${v.lang})`, index);
                    enSelect.add(opt);
                }
            });

            // 預設中文選取邏輯：優先找微軟雅婷(Yating) -> 菡菡(Hanhan) -> 台灣繁中 -> 第一個中文聲音
            if (!currentZhSelection && zhSelect.options.length > 0) {
                let defaultZhIdx = voices.findIndex(v => v.name.includes('Yating'));
                if (defaultZhIdx === -1) defaultZhIdx = voices.findIndex(v => v.name.includes('Hanhan'));
                if (defaultZhIdx === -1) defaultZhIdx = voices.findIndex(v => v.lang.toLowerCase() === 'zh-tw');
                if (defaultZhIdx === -1) defaultZhIdx = voices.findIndex(v => v.lang.toLowerCase().startsWith('zh'));
                
                if (defaultZhIdx !== -1) zhSelect.value = defaultZhIdx;
            } else if (currentZhSelection) {
                zhSelect.value = currentZhSelection;
            }

            // 預設英文選取邏輯：優先找 Zira -> Google US -> 第一個英文聲音
            if (!currentEnSelection && enSelect.options.length > 0) {
                let defaultEnIdx = voices.findIndex(v => v.name.includes('Zira'));
                if (defaultEnIdx === -1) defaultEnIdx = voices.findIndex(v => v.name.includes('Google US English'));
                if (defaultEnIdx === -1) defaultEnIdx = voices.findIndex(v => v.lang.toLowerCase().startsWith('en'));
                
                if (defaultEnIdx !== -1) enSelect.value = defaultEnIdx;
            } else if (currentEnSelection) {
                enSelect.value = currentEnSelection;
            }
        }
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    function updateSystemTime() {
        const timeVal = document.getElementById('sysTime').value;
        document.getElementById('pids-clock').innerText = `目前時間 ${timeVal}`;
        updateData();
        checkAndBroadcast();
    }

    function getTrainData(idx) {
        const typeSelect = document.getElementById(`t${idx}_type`);
        const viaSelect = document.getElementById(`t${idx}_via`);
        
        const [typeClass, typeEn] = typeSelect.value.split('|');
        const [viaZh, viaEn] = viaSelect.value.split('|');
        
        return {
            num: document.getElementById(`t${idx}_num`).value,
            typeClass: typeClass,
            typeName: typeSelect.options[typeSelect.selectedIndex].text,
            typeEn: typeEn,
            viaZh: viaZh,
            viaEn: viaEn,
            time: document.getElementById(`t${idx}_time`).value,
            dest: document.getElementById(`t${idx}_dest`).value,
            destEn: document.getElementById(`t${idx}_dest_en`).value,
            plat: document.getElementById(`t${idx}_plat`).value,
            delay: parseInt(document.getElementById(`t${idx}_delay`).value) || 0
        };
    }

    function updateData() {
        const pidsBody = document.getElementById('pids-body');
        const t1 = getTrainData(1);
        const t2 = getTrainData(2);

        const stZh = document.getElementById('station_zh').value || "台北";
        const stEn = document.getElementById('station_en').value || "Taipei";

        document.getElementById('pids-station-name').innerText = `本站：${stZh} STATION: ${stEn.toUpperCase()}`;

        let html = '';
        [t1, t2].forEach((t) => {
            const delayClass = t.delay > 0 ? 'c-status-delay' : 'c-status-on-time';
            
            let delayText = "";
            let viaText = "";
            let destText = "";
            let typeText = "";
            
            if (pidsLang === 'zh') {
                delayText = t.delay > 0 ? `晚 ${t.delay} 分` : '準點';
                viaText = t.viaZh || '';
                destText = t.dest;
                typeText = t.typeName;
            } else {
                delayText = t.delay > 0 ? `${t.delay} Min Late` : 'On Time';
                viaText = t.viaEn || '';
                destText = t.destEn || t.dest;
                typeText = t.typeEn.replace(" Limited Express", "").replace(" Express", "");
            }

            html += `
                <tr>
                    <td><span style="color:#fff;">${t.num}</span></td>
                    <td><span class="${t.typeClass}">${typeText}</span></td>
                    <td><span style="color:#00ff00;">${viaText}</span></td>
                    <td><span class="c-destination">${destText}</span></td>
                    <td><span class="c-time">${t.time}</span></td>
                    <td><span class="c-platform">${t.plat}</span></td>
                    <td><span class="${delayClass}">${delayText}</span></td>
                </tr>
            `;
        });
        pidsBody.innerHTML = html;

        const marquee = document.getElementById('pids-marquee-text');
        if (pidsLang === 'zh') {
            marquee.innerText = `歡迎光臨${stZh}車站，提醒您候車時請勿超越黃色警戒線，祝您旅途愉快。`;
        } else {
            marquee.innerText = `Welcome to ${stEn} Station. For your safety, please stand behind the yellow line on the platform. Have a pleasant journey.`;
        }
    }

    function logAction(msg) {
        const box = document.getElementById('logBox');
        const now = document.getElementById('sysTime').value;
        box.innerHTML += `<br>[${now}] ${msg}`;
        box.scrollTop = box.scrollHeight;
    }

    function splitTrainNumber(numStr) {
        return numStr.split('').join(' ');
    }

    function speak(text, isEnglish = false) {
        if (!('speechSynthesis' in window)) {
            logAction("⚠️ 你的瀏覽器不支援語音合成功能。");
            return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.volume = 1.0; 

        if (isEnglish) {
            utterance.rate = 0.75; 
            // 直接抓英文選單內指定的語音引擎物件
            const enSelectIdx = document.getElementById('voice_en_select').value;
            if (enSelectIdx !== "" && voices[enSelectIdx]) {
                utterance.voice = voices[enSelectIdx];
            }
        } else {
            utterance.rate = 0.85; 
            // 直接抓中文選單內指定的語音引擎物件
            const zhSelectIdx = document.getElementById('voice_zh_select').value;
            if (zhSelectIdx !== "" && voices[zhSelectIdx]) {
                utterance.voice = voices[zhSelectIdx];
            }
        }

        window.speechSynthesis.speak(utterance);
    }

    function executeStationBroadcast(train, isDelayReport) {
        const timeParts = train.time.split(':');
        const spokenTimeZh = `${timeParts[0]}點${timeParts[1]}分`;
        
        const brokenNum = splitTrainNumber(train.num);
        
        let textZh = "", textEn = "";
        
        let spokenTypeNameZh = train.typeName;
        if (spokenTypeNameZh === "新自強") spokenTypeNameZh = "新自強號";
        if (spokenTypeNameZh === "區間") spokenTypeNameZh = "區間車";

        const viaZhText = train.viaZh ? `經由${train.viaZh}，` : "";
        const viaEnText = train.viaEn ? `via ${train.viaEn}, ` : "";
        
        const spokenDestEn = train.destEn || train.dest;

        if (!isDelayReport) {
            logAction(`🚉 播放車站廣播：【${train.num}次】進站候車`);
            textZh = `各位旅客您好，${spokenTimeZh}，${viaZhText}開往${train.dest}，${brokenNum}次${spokenTypeNameZh}，請到第${train.plat}月台候車。`;
            textEn = `Attention please, ${train.time}, ${viaEnText}bound for ${spokenDestEn}, train number ${brokenNum}, ${train.typeEn}, please go to platform ${train.plat} for boarding.`;
        } else {
            logAction(`🚉 播放車站廣播：【${train.num}次】晚點提醒`);
            textZh = `各位旅客您好，${spokenTimeZh}，${viaZhText}開往${train.dest}，${brokenNum}次${spokenTypeNameZh}，大約晚${train.delay}分。`;
            textEn = `Attention please, ${train.time}, ${viaEnText}bound for ${spokenDestEn}, train number ${brokenNum}, ${train.typeEn}, is delayed about ${train.delay} minutes.`;
        }

        speak(textZh, false);
        speak(textEn, true);
    }

    function checkAndBroadcast() {
        const curTime = document.getElementById('sysTime').value;
        const [curH, curM] = curTime.split(':').map(Number);

        ['t1', 't2'].forEach((id, index) => {
            const t = getTrainData(index + 1);
            if (!t.time) return;
            const [tH, tM] = t.time.split(':').map(Number);
            
            const diffMinutes = (tH * 60 + tM) - (curH * 60 + curM);

            if (diffMinutes === 10 && lastNormalBroadcast[id] !== curTime) {
                lastNormalBroadcast[id] = curTime;
                executeStationBroadcast(t, false);
            }

            if (t.delay >= 10) {
                if (curM % 5 === 0 && lastDelayBroadcast[id] !== curM) {
                    lastDelayBroadcast[id] = curM;
                    executeStationBroadcast(t, true);
                }
            }
        });
    }

    function triggerStationBroadcastCheck() {
        if ('speechSynthesis' in window) window.speechSynthesis.resume();
        const t1 = getTrainData(1);
        if (t1.delay >= 10) {
            executeStationBroadcast(t1, true);
        } else {
            executeStationBroadcast(t1, false);
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        updateData();
        setTimeout(loadVoices, 600); // 延遲抓取確保系統引擎完全就位
        
        setInterval(() => {
            pidsLang = (pidsLang === 'zh') ? 'en' : 'zh';
            updateData();
        }, 10000);
        
        setInterval(() => {
            const timeInput = document.getElementById('sysTime');
            let [h, m] = timeInput.value.split(':').map(Number);
            m++;
            if (m >= 60) { m = 0; h++; }
            if (h >= 24) { h = 0; }
            timeInput.value = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            updateSystemTime();
        }, 60000);
    });
</script>

</body>
</html>
